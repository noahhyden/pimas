name: CI

# The gate that protects the source the release is built from: every push to
# main and every PR must typecheck, pass the full test suite, and build.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/check-package.mjs # supply-chain guard: zero runtime deps
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # The real-browser suite: things a simulated DOM can't honestly answer (layout,
  # focus, SVG geometry, trusted events, live form state, async timing). Driven
  # headless over CDP by scripts/browser-ci.mjs. Chrome is preinstalled on the
  # runner image; the runner discovers `google-chrome-stable` on PATH.
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:browser:ci

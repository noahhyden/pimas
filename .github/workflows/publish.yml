name: Publish to npm

# Publishes ONLY from CI, ONLY from a GitHub Release (or a manual dispatch),
# with cryptographic PROVENANCE via OIDC. This is the supply-chain guarantee:
# the tarball on npm is built here from the public, tagged source — not from
# anyone's laptop — and npm records a verifiable "Built and signed on GitHub
# Actions" attestation linking the package to this exact commit + workflow.
#
# Auth: for a package that already exists on npm, prefer Trusted Publishing (OIDC)
# — no long-lived token to leak. Configure it once on npmjs.com: package `pimas-ui`
# → Settings → Trusted Publisher → GitHub Actions, repo noahhyden/pimas, workflow
# "publish.yml", then you can delete the NPM_TOKEN secret below.
#
# FIRST publish (the package does not exist yet, so a trusted publisher can't be
# configured): add an `NPM_TOKEN` repo secret (an npm "Automation" token). The
# publish step reads it via NODE_AUTH_TOKEN. `--provenance` still works with a
# token because `id-token: write` is granted below.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for provenance + OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest # ensure OIDC/provenance support
      - run: npm ci
      # Re-verify the exact source we're about to ship — defense in depth.
      - run: node scripts/check-package.mjs # refuse to publish if runtime deps leaked in
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # prepack rebuilds dist; --provenance emits the signed attestation.
      # NODE_AUTH_TOKEN is read from the NPM_TOKEN secret (first publish / token
      # auth); leave the secret unset once OIDC trusted publishing is configured.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

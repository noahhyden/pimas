<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" width="820" height="380" role="img" aria-label="Pimas demo: incrementing a signal re-runs only the single DOM node that read it — the surrounding static markup never repaints.">
  <title>Pimas — fine-grained reactivity</title>
  <desc>A code panel calls setCount to increment a signal from 0 to 3. On the rendered side, only the node that reads count() flashes and updates on each change; the static header and button chrome never repaint.</desc>
  <style>
    /* Self-contained CSS animations — play when the file is embedded via &lt;img&gt;.
       No &lt;script&gt; (GitHub strips it); everything below is declarative. */
    :root {}
    text { font-family: ui-monospace, "SF Mono", "Menlo", "Consolas", monospace; }
    .bg      { fill: #0b0b0d; }
    .panel   { fill: #141418; stroke: #26262b; stroke-width: 1; }
    .dot     { }
    .muted   { fill: #8a8a92; }
    .txt     { fill: #d7d7da; }
    .kw      { fill: #c792ea; }
    .fn      { fill: #82aaff; }
    .str     { fill: #ecc48d; }
    .num     { fill: #f78c6c; }
    .green   { fill: #4ade80; }
    .caption { fill: #8a8a92; }

    /* --- digit swap: 0,1,2,3 over an 8s loop, each visible for one quarter --- */
    .d0, .d1, .d2, .d3 { animation: 8s linear infinite; }
    .d0 { animation-name: show0; }
    .d1 { animation-name: show1; }
    .d2 { animation-name: show2; }
    .d3 { animation-name: show3; }
    @keyframes show0 { 0%{opacity:1} 24%{opacity:1} 25%{opacity:0} 99.5%{opacity:0} 100%{opacity:1} }
    @keyframes show1 { 0%{opacity:0} 24.5%{opacity:0} 25%{opacity:1} 49%{opacity:1} 50%{opacity:0} 100%{opacity:0} }
    @keyframes show2 { 0%{opacity:0} 49.5%{opacity:0} 50%{opacity:1} 74%{opacity:1} 75%{opacity:0} 100%{opacity:0} }
    @keyframes show3 { 0%{opacity:0} 74.5%{opacity:0} 75%{opacity:1} 99%{opacity:1} 100%{opacity:0} }

    /* --- flash the pill exactly at each value change --- */
    .flash { animation: flash 8s linear infinite; }
    @keyframes flash {
      0%{opacity:.9} 7%{opacity:0} 24.9%{opacity:0}
      25%{opacity:.9} 32%{opacity:0} 49.9%{opacity:0}
      50%{opacity:.9} 57%{opacity:0} 74.9%{opacity:0}
      75%{opacity:.9} 82%{opacity:0} 100%{opacity:0}
    }

    /* --- the "1 node updated" pulse, in sync with the flash --- */
    .pulse { animation: pulse 8s linear infinite; }
    @keyframes pulse {
      0%{opacity:1} 12%{opacity:.25} 24.9%{opacity:.25}
      25%{opacity:1} 37%{opacity:.25} 49.9%{opacity:.25}
      50%{opacity:1} 62%{opacity:.25} 74.9%{opacity:.25}
      75%{opacity:1} 87%{opacity:.25} 100%{opacity:.25}
    }

    /* --- the code line that "runs": setCount briefly highlights --- */
    .runline { animation: runline 8s linear infinite; }
    @keyframes runline {
      0%{opacity:0} 3%{opacity:.14} 12%{opacity:0} 24.9%{opacity:0}
      25%{opacity:.14} 34%{opacity:0} 49.9%{opacity:0}
      50%{opacity:.14} 59%{opacity:0} 74.9%{opacity:0}
      75%{opacity:.14} 84%{opacity:0} 100%{opacity:0}
    }
  </style>

  <!-- backdrop -->
  <rect class="bg" x="0" y="0" width="820" height="380" rx="14"/>

  <!-- window chrome -->
  <circle cx="26" cy="26" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="26" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="26" r="6" fill="#27c93f"/>
  <text class="muted" x="410" y="30" text-anchor="middle" font-size="12">pimas — fine-grained, no virtual DOM, no diffing</text>

  <!-- ============ left: source ============ -->
  <rect class="panel" x="24" y="54" width="392" height="256" rx="10"/>
  <g font-size="13.5">
    <!-- run-highlight band behind the setCount line -->
    <rect class="runline" x="34" y="176" width="372" height="22" rx="4" fill="#4ade80"/>

    <text x="44" y="86"><tspan class="kw">import</tspan><tspan class="txt"> { </tspan><tspan class="fn">createSignal</tspan><tspan class="txt"> } </tspan><tspan class="kw">from</tspan><tspan class="str"> "pimas"</tspan></text>

    <text x="44" y="132"><tspan class="kw">const</tspan><tspan class="txt"> [count, setCount] = </tspan></text>
    <text x="44" y="152"><tspan class="txt">  </tspan><tspan class="fn">createSignal</tspan><tspan class="txt">(</tspan><tspan class="num">0</tspan><tspan class="txt">)</tspan></text>

    <text x="44" y="192"><tspan class="fn">setCount</tspan><tspan class="txt">(</tspan><tspan class="fn">count</tspan><tspan class="txt">() </tspan><tspan class="kw">+</tspan><tspan class="num"> 1</tspan><tspan class="txt">)</tspan><tspan class="caption">   // ← fires</tspan></text>

    <text x="44" y="238"><tspan class="muted">&lt;button&gt;</tspan></text>
    <text x="44" y="258"><tspan class="txt">  count is </tspan><tspan class="green">{ count() }</tspan><tspan class="caption">  ← the only reader</tspan></text>
    <text x="44" y="278"><tspan class="muted">&lt;/button&gt;</tspan></text>
  </g>

  <!-- arrow -->
  <text class="muted" x="430" y="192" font-size="20">→</text>

  <!-- ============ right: rendered UI ============ -->
  <rect class="panel" x="452" y="54" width="344" height="256" rx="10"/>
  <text class="muted" x="472" y="86" font-size="12">rendered DOM</text>

  <!-- the button (static chrome) -->
  <rect x="480" y="118" width="288" height="88" rx="10" fill="#1c1c22" stroke="#2f2f36"/>
  <text class="txt" x="504" y="170" font-size="22">count is</text>

  <!-- the reactive node: pill + flash + swapping digit -->
  <rect x="636" y="140" width="56" height="56" rx="10" fill="#132a1c" stroke="#2b5c3c"/>
  <rect class="flash" x="636" y="140" width="56" height="56" rx="10" fill="#4ade80"/>
  <g font-size="34" text-anchor="middle" font-weight="bold">
    <text class="green d0" x="664" y="182">0</text>
    <text class="green d1" x="664" y="182">1</text>
    <text class="green d2" x="664" y="182">2</text>
    <text class="green d3" x="664" y="182">3</text>
  </g>

  <!-- "1 node updated" indicator, tucked under the pill -->
  <g class="pulse" font-size="12.5">
    <circle cx="614" cy="226" r="4" class="green"/>
    <text class="green" x="626" y="230">1 node updated</text>
  </g>

  <!-- annotations -->
  <g font-size="12.5">
    <text class="muted" x="480" y="256">static markup —</text>
    <text class="muted" x="480" y="274">"count is", button, layout:</text>
    <text class="green"  x="480" y="292" font-weight="bold">0 repaints, ever</text>
  </g>

  <!-- caption -->
  <text class="caption" x="410" y="344" text-anchor="middle" font-size="13">Change one value — only the exact node that read it re-runs. No virtual DOM. No diff.</text>
</svg>
